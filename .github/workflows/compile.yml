name: Compile LaTeX

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full biber
          
      - name: Organiser les fichiers
        run: |
          mkdir -p Figures
          mkdir -p Logos
          cp logo_fst.png Logos/ 2>/dev/null || true
          cp logo_bewize.png Logos/ 2>/dev/null || true
          cp bewize.jpg Logos/ 2>/dev/null || true
          cp bewize.png Logos/ 2>/dev/null || true
          for f in *.png *.jpg *.jpeg; do
            if [[ "$f" != logo_* ]] && [[ "$f" != bewize* ]]; then
              cp "$f" Figures/ 2>/dev/null || true
            fi
          done
          
      - name: Compiler LaTeX
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error main.tex || true
          bibtex main || true
          pdflatex -interaction=nonstopmode main.tex || true
          pdflatex -interaction=nonstopmode main.tex || true
          ls -la main.pdf || echo "PDF non généré"
          
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: rapport-lamyaa
          path: main.pdf
          if-no-files-found: warn
