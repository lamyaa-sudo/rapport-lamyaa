name: Compile LaTeX

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          
      - name: Upload PDF
        uses: actions/upload-artifact@v3
        with:
          name: rapport-lamyaa
          path: main.pdf
