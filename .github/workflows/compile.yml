name: Compile LaTeX

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Organiser les fichiers
        run: |
          mkdir -p Figures
          mkdir -p Logos
          cp logo_fst.png Logos/ 2>/dev/null || true
          cp logo_bewize.png Logos/ 2>/dev/null || true
          cp bewize.jpg Logos/ 2>/dev/null || true
          cp bewize.png Logos/ 2>/dev/null || true
          for f in *.png *.jpg *.jpeg; do
            if [[ "$f" != logo_* ]] && [[ "$f" != bewize* ]]; then
              cp "$f" Figures/ 2>/dev/null || true
            fi
          done
          
      - name: Compiler LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: false
          extra_system_packages: "biber"
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode
          
      - name: Télécharger PDF
        uses: actions/upload-artifact@v4
        with:
          name: rapport-lamyaa
          path: main.pdf
